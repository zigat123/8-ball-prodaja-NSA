<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="auth-card glass p-5 animate-fade-in">
    <div class="text-center mb-5">
      <h2 class="gold-gradient-text fw-bold mb-2">Welcome Back</h2>
      <p class="text-muted">Sign in to your premium billiard account</p>
    </div>
    
    <form (submit)="false">
      <div class="mb-4">
        <label class="form-label text-secondary small text-uppercase fw-bold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-envelope"></i></span>
          <input type="email" class="form-control bg-transparent border-secondary text-white" placeholder="you@example.com" />
        </div>
      </div>
      
      <div class="mb-5">
        <label class="form-label text-secondary small text-uppercase fw-bold">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control bg-transparent border-secondary text-white" placeholder="••••••••" />
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Access Account</button>
      
      <p class="text-center text-muted mb-0">
        Don't have an account? <a routerLink="/register" class="text-gold text-decoration-none">Create one here</a>
      </p>
    </form>
  </div>
</div>
