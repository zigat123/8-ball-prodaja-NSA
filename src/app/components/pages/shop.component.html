<div class="shop-shell container my-5">
  <section class="filters-section rounded-4 p-4 mb-4 bg-dark-secondary border border-secondary">
    <div class="row gy-3 align-items-center">
      <div class="col-md-6">
        <label class="form-label text-muted mb-1">Search</label>
        <input class="form-control form-control-lg bg-black text-white border-secondary" placeholder="Search cues, tables, accessories..." [ngModel]="query()" (ngModelChange)="query.set($event)" />
      </div>
      <div class="col-md-3">
        <label class="form-label text-muted mb-1">Category</label>
        <select class="form-select form-select-lg bg-black text-white border-secondary" [ngModel]="category()" (ngModelChange)="category.set($event)">
          <option *ngFor="let c of categories">{{ c }}</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label text-muted mb-1">Sort by</label>
        <select class="form-select form-select-lg bg-black text-white border-secondary" [ngModel]="sortBy()" (ngModelChange)="sortBy.set($event)">
          <option value="featured">Recommended</option>
          <option value="newest">Newest</option>
          <option value="priceAsc">Price: Low to High</option>
          <option value="priceDesc">Price: High to Low</option>
        </select>
      </div>
    </div>
  </section>

  <section class="product-grid row gx-4 gy-4">
    <div class="col-12 col-sm-6 col-lg-4" *ngFor="let product of sorted()">
      <app-product-card [product]="product" [add]="addToCart"></app-product-card>
    </div>
  </section>
</div>
