<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="auth-card glass p-5 animate-fade-in">
    <div class="text-center mb-5">
      <h2 class="gold-gradient-text fw-bold mb-2">Create Account</h2>
      <p class="text-muted">Join the elite community of billiard enthusiasts</p>
    </div>
    
    <form (submit)="false">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label text-secondary small text-uppercase fw-bold">First Name</label>
          <input type="text" class="form-control bg-transparent border-secondary text-white" placeholder="John" />
        </div>
        <div class="col-md-6">
          <label class="form-label text-secondary small text-uppercase fw-bold">Last Name</label>
          <input type="text" class="form-control bg-transparent border-secondary text-white" placeholder="Doe" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-secondary small text-uppercase fw-bold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-envelope"></i></span>
          <input type="email" class="form-control bg-transparent border-secondary text-white" placeholder="you@example.com" />
        </div>
      </div>
      
      <div class="mb-5">
        <label class="form-label text-secondary small text-uppercase fw-bold">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control bg-transparent border-secondary text-white" placeholder="••••••••" />
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Register Now</button>
      
      <p class="text-center text-muted mb-0">
        Already have an account? <a routerLink="/login" class="text-gold text-decoration-none">Sign in here</a>
      </p>
    </form>
  </div>
</div>
